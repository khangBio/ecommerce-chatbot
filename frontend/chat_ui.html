<!-- frontend/chat_ui.html -->
<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>E-commerce Chatbot</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        
        .chat-container {
            width: 400px;
            height: 600px;
            background: white;
            border-radius: 20px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        
        .chat-header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            text-align: center;
            font-size: 20px;
            font-weight: bold;
        }
        
        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            background: #f5f5f5;
        }
        
        .message {
            margin-bottom: 15px;
            display: flex;
            align-items: flex-start;
        }
        
        .message.user {
            justify-content: flex-end;
        }
        
        .message-content {
            max-width: 70%;
            padding: 12px 16px;
            border-radius: 18px;
            word-wrap: break-word;
        }
        
        .message.bot .message-content {
            background: white;
            color: #333;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        
        .message.user .message-content {
            background: #667eea;
            color: white;
        }
        
        .product-card {
            background: white;
            border-radius: 12px;
            padding: 12px;
            margin-top: 10px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        
        .product-card h4 {
            color: #667eea;
            margin-bottom: 8px;
        }
        
        .product-price {
            color: #e91e63;
            font-weight: bold;
            font-size: 16px;
        }
        
        .chat-input {
            display: flex;
            padding: 15px;
            background: white;
            border-top: 1px solid #eee;
        }
        
        .chat-input input {
            flex: 1;
            padding: 12px;
            border: 2px solid #eee;
            border-radius: 25px;
            outline: none;
            font-size: 14px;
        }
        
        .chat-input input:focus {
            border-color: #667eea;
        }
        
        .chat-input button {
            margin-left: 10px;
            padding: 12px 24px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            font-weight: bold;
        }
        
        .chat-input button:hover {
            opacity: 0.9;
        }
        
        .typing-indicator {
            display: none;
            padding: 10px;
            color: #999;
            font-style: italic;
        }
    </style>
</head>
<body>
    <div class="chat-container">
        <div class="chat-header">
            🛍️ Trợ lý mua sắm AI
        </div>
        
        <div class="chat-messages" id="chatMessages">
            <div class="message bot">
                <div class="message-content">
                    Xin chào! Tôi là trợ lý ảo. Tôi có thể giúp bạn:<br>
                    • Tư vấn và tìm kiếm sản phẩm<br>
                    • Theo dõi đơn hàng<br>
                    • Hỗ trợ đổi trả và bảo hành<br><br>
                    Bạn cần giúp gì?
                </div>
            </div>
        </div>
        
        <div class="typing-indicator" id="typingIndicator">
            Bot đang nhập...
        </div>
        
        <div class="chat-input">
            <input type="text" id="userInput" placeholder="Nhập tin nhắn..." 
                   onkeypress="handleKeyPress(event)">
            <button onclick="sendMessage()">Gửi</button>
        </div>
    </div>

    <script>
        let conversationId = null;
        const userId = 'user_' + Math.random().toString(36).substr(2, 9);
        const API_URL = 'http://localhost:8000';

        function handleKeyPress(event) {
            if (event.key === 'Enter') {
                sendMessage();
            }
        }

        async function sendMessage() {
            const input = document.getElementById('userInput');
            const message = input.value.trim();
            
            if (!message) return;
            
            // Display user message
            addMessage(message, 'user');
            input.value = '';
            
            // Show typing indicator
            document.getElementById('typingIndicator').style.display = 'block';
            
            try {
                // Call API
                const response = await fetch(`${API_URL}/chat`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        user_id: userId,
                        message: message,
                        conversation_id: conversationId
                    })
                });
                
                const data = await response.json();
                
                // Update conversation ID
                conversationId = data.conversation_id;
                
                // Hide typing indicator
                document.getElementById('typingIndicator').style.display = 'none';
                
                // Display bot message
                addMessage(data.bot_message, 'bot');
                
                // Display products if any
                if (data.products && data.products.length > 0) {
                    displayProducts(data.products);
                }
                
            } catch (error) {
                console.error('Error:', error);
                document.getElementById('typingIndicator').style.display = 'none';
                addMessage('Xin lỗi, đã có lỗi xảy ra. Vui lòng thử lại.', 'bot');
            }
        }

        function addMessage(text, sender) {
            const messagesDiv = document.getElementById('chatMessages');
            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${sender}`;
            
            const contentDiv = document.createElement('div');
            contentDiv.className = 'message-content';
            contentDiv.textContent = text;
            
            messageDiv.appendChild(contentDiv);
            messagesDiv.appendChild(messageDiv);
            messagesDiv.scrollTop = messagesDiv.scrollHeight;
        }

        function displayProducts(products) {
            const messagesDiv = document.getElementById('chatMessages');
            
            products.slice(0, 3).forEach(product => {
                const productCard = document.createElement('div');
                productCard.className = 'product-card';
                productCard.innerHTML = `
                    <h4>${product.name}</h4>
                    <p style="font-size: 13px; color: #666; margin: 8px 0;">
                        ${product.description}
                    </p>
                    <div class="product-price">
                        ${product.price.toLocaleString('vi-VN')}đ
                    </div>
                    <button style="margin-top: 10px; padding: 8px 16px; 
                                   background: #667eea; color: white; 
                                   border: none; border-radius: 8px; cursor: pointer;"
                            onclick="orderProduct('${product.id}')">
                        Đặt hàng
                    </button>
                `;
                messagesDiv.appendChild(productCard);
            });
            
            messagesDiv.scrollTop = messagesDiv.scrollHeight;
        }

        function orderProduct(productId) {
            document.getElementById('userInput').value = 
                `Tôi muốn đặt sản phẩm ${productId}`;
            sendMessage();
        }
    </script>
</body>
</html>
